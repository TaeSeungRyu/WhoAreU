<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'" />
    <title>WhoAreU</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1>WhoAreU</h1>
      <input id="search" type="search" placeholder="이름 · 게시자 · 경로 검색" autocomplete="off" />
      <div class="sort-group">
        <label for="sortKey">정렬</label>
        <select id="sortKey">
          <option value="totalMemoryBytes">메모리 합계</option>
          <option value="diskBytes">디스크 용량</option>
          <option value="installDate">설치일</option>
          <option value="processCount">프로세스 개수</option>
          <option value="name">이름</option>
          <option value="publisher">게시자</option>
        </select>
        <button id="sortDir" type="button" title="정렬 방향 전환">▼</button>
      </div>
      <button id="refresh" type="button">새로고침</button>
      <label class="toggle">
        <input id="autoRefresh" type="checkbox" checked />
        <span>자동 갱신</span>
      </label>
      <span id="status" class="status"></span>
    </header>
    <main>
      <div id="cards" class="cards"></div>
      <div id="empty" class="placeholder hidden">표시할 프로세스가 없습니다.</div>
      <div id="error" class="placeholder error hidden"></div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
